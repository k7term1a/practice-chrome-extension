<html>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        video {
            position:fixed;
            object-fit: cover;
            z-index: -1;
            width: 100%;
            height: 100%;
            object-position: 50% 50%;
            transform-origin: 50% 50%;
            }
    </style>
    <body>
        <input type="file" id="file-uploader" accept="video/*" style="position: absolute; top: 10px; left: 10px; z-index: 1;">
        <video muted autoplay loop playsinline id="wallpaper">
            <source src="wallpaper.mp4" type="video/mp4">
        </video>
    </body>
    <script src="newtab.js"></script>
</html>
